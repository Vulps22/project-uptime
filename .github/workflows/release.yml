name: Release Pipeline

on:
  schedule:
    - cron: '0 12 * * 4' # Every Thursday at noon UTC
  workflow_dispatch:

permissions:
  contents: write

jobs:
  # ── Dispatch ───────────────────────────────────────────────────────────────
  # Calculates the expected version for this month, then decides:
  #   odd week  → freeze  (only if main has new commits since the last freeze)
  #   even week → release (only if the expected freeze branch exists)
  #   otherwise → skip
  dispatch:
    runs-on: ubuntu-latest
    outputs:
      action:        ${{ steps.decide.outputs.action }}
      version:       ${{ steps.decide.outputs.version }}
      freeze_branch: ${{ steps.decide.outputs.freeze_branch }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Decide action and version
        id: decide
        run: |
          git fetch --all --tags --quiet

          # ── Canonical version for this release slot ────────────────────────
          # The version is always: v<year>.<month>.<existing_release_count + 1>
          # Both freeze and release weeks target the same version/branch.
          YEAR=$(date +%Y)
          MONTH=$(date +%-m)
          COUNT=$(git tag --list "v${YEAR}.${MONTH}.*" | wc -l)
          RELEASE=$((COUNT + 1))
          VERSION="v${YEAR}.${MONTH}.${RELEASE}"
          FREEZE_BRANCH="freeze/${VERSION}"

          WEEK=$(date +%V)
          WEEK=$((10#$WEEK))
          echo "ISO week: $WEEK — target version: ${VERSION}"

          if (( WEEK % 2 == 1 )); then
            # ── Odd week → freeze? ─────────────────────────────────────────
            LAST_FREEZE=$(git ls-remote --heads origin 'freeze/v*' \
              | awk '{print $2}' | sed 's|refs/heads/||' | sort -V | tail -1)

            if [[ -z "$LAST_FREEZE" ]]; then
              # No freeze branches yet — always proceed
              NEW_COMMITS=1
            else
              NEW_COMMITS=$(git log "origin/${LAST_FREEZE}..origin/main" --oneline | wc -l)
            fi

            if (( NEW_COMMITS > 0 )); then
              ACTION=freeze
              echo "Freeze week — ${NEW_COMMITS} new commit(s) since last freeze, creating ${FREEZE_BRANCH}"
            else
              ACTION=skip
              echo "Freeze week — no new commits since last freeze, skipping"
            fi

          else
            # ── Even week → release? ───────────────────────────────────────
            if git ls-remote --heads origin "${FREEZE_BRANCH}" | grep -q "${FREEZE_BRANCH}"; then
              ACTION=release
              echo "Release week — freeze branch ${FREEZE_BRANCH} found, releasing"
            else
              ACTION=skip
              echo "Release week — no freeze branch for ${VERSION}, skipping"
            fi
          fi

          echo "action=${ACTION}"               >> $GITHUB_OUTPUT
          echo "version=${VERSION}"             >> $GITHUB_OUTPUT
          echo "freeze_branch=${FREEZE_BRANCH}" >> $GITHUB_OUTPUT

  # ── Freeze ─────────────────────────────────────────────────────────────────
  freeze:
    needs: dispatch
    if: needs.dispatch.outputs.action == 'freeze'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Create freeze branch from main
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git checkout -b ${{ needs.dispatch.outputs.freeze_branch }}
          git push origin ${{ needs.dispatch.outputs.freeze_branch }}

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - run: npm ci
      - run: npm test

  # ── Release — test ─────────────────────────────────────────────────────────
  release-test:
    needs: dispatch
    if: needs.dispatch.outputs.action == 'release'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.dispatch.outputs.freeze_branch }}

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - run: npm ci
      - run: npm test

  # ── Release — build & publish ──────────────────────────────────────────────
  release-build:
    needs: [dispatch, release-test]
    if: needs.dispatch.outputs.action == 'release'
    runs-on: ubuntu-latest
    env:
      VERSION:       ${{ needs.dispatch.outputs.version }}
      FREEZE_BRANCH: ${{ needs.dispatch.outputs.freeze_branch }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure git
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Tag RC on freeze branch
        run: |
          git fetch --all --tags
          git tag "${VERSION}-rc" "origin/${FREEZE_BRANCH}"
          git push origin "${VERSION}-rc"

      - name: Merge freeze into current-release and tag release
        run: |
          if git ls-remote --heads origin current-release | grep -q current-release; then
            git checkout -b current-release origin/current-release
          else
            git checkout -b current-release
          fi
          git merge --no-ff "origin/${FREEZE_BRANCH}" -m "Release ${VERSION}"
          git push origin current-release
          git tag "${VERSION}"
          git push origin "${VERSION}"

      - name: Merge release into main
        run: |
          git fetch origin main
          git checkout main
          git merge --no-ff "${VERSION}" -m "Merge release ${VERSION} into main"
          git push origin main

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/project-uptime:${{ needs.dispatch.outputs.version }}
            ${{ secrets.DOCKERHUB_USERNAME }}/project-uptime:latest

  # ── Release — deploy ───────────────────────────────────────────────────────
  release-deploy:
    needs: [dispatch, release-build]
    if: needs.dispatch.outputs.action == 'release'
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to production VPS
        uses: appleboy/ssh-action@v1
        with:
          host:     ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key:      ${{ secrets.VPS_SSH_KEY }}
          script: |
            cd /opt/discord-bots/project-uptime
            docker compose down
            docker compose pull
            docker compose up -d
