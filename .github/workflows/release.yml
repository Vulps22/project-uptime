name: Release Pipeline

on:
  schedule:
    - cron: '0 12 * * 4' # Every Thursday at noon UTC
  workflow_dispatch:

permissions:
  contents: write

jobs:
  # ── Dispatch ───────────────────────────────────────────────────────────────
  # Determines whether this Thursday is a freeze (odd ISO week) or release
  # (even ISO week), then resolves the target version and freeze branch name.
  dispatch:
    runs-on: ubuntu-latest
    outputs:
      action:        ${{ steps.decide.outputs.action }}
      version:       ${{ steps.decide.outputs.version }}
      freeze_branch: ${{ steps.decide.outputs.freeze_branch }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Decide action and version
        id: decide
        run: |
          WEEK=$(date +%V)
          WEEK=$((10#$WEEK))   # strip any leading zero for arithmetic
          echo "ISO week: $WEEK"

          if (( WEEK % 2 == 1 )); then
            # ── Odd week → freeze ──────────────────────────────────────────
            ACTION=freeze
            YEAR=$(date +%Y)
            MONTH=$(date +%-m)
            git fetch --tags --quiet
            COUNT=$(git tag --list "v${YEAR}.${MONTH}.*" | wc -l)
            RELEASE=$((COUNT + 1))
            VERSION="v${YEAR}.${MONTH}.${RELEASE}"
            FREEZE_BRANCH="freeze/${VERSION}"
            echo "Freeze week — will create ${FREEZE_BRANCH}"
          else
            # ── Even week → release ────────────────────────────────────────
            ACTION=release
            git fetch --all --quiet
            FREEZE_BRANCH=$(git ls-remote --heads origin 'freeze/v*' \
              | awk '{print $2}' \
              | sed 's|refs/heads/||' \
              | sort -V | tail -1)
            if [[ -z "$FREEZE_BRANCH" ]]; then
              echo "::error::No freeze/v* branch found — cannot release."
              exit 1
            fi
            VERSION="${FREEZE_BRANCH#freeze/}"
            echo "Release week — will release from ${FREEZE_BRANCH}"
          fi

          echo "action=${ACTION}"               >> $GITHUB_OUTPUT
          echo "version=${VERSION}"             >> $GITHUB_OUTPUT
          echo "freeze_branch=${FREEZE_BRANCH}" >> $GITHUB_OUTPUT

  # ── Freeze ─────────────────────────────────────────────────────────────────
  freeze:
    needs: dispatch
    if: needs.dispatch.outputs.action == 'freeze'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Create freeze branch from main
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git checkout -b ${{ needs.dispatch.outputs.freeze_branch }}
          git push origin ${{ needs.dispatch.outputs.freeze_branch }}

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - run: npm ci
      - run: npm test

  # ── Release — test ─────────────────────────────────────────────────────────
  release-test:
    needs: dispatch
    if: needs.dispatch.outputs.action == 'release'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.dispatch.outputs.freeze_branch }}

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - run: npm ci
      - run: npm test

  # ── Release — build & publish ──────────────────────────────────────────────
  release-build:
    needs: [dispatch, release-test]
    if: needs.dispatch.outputs.action == 'release'
    runs-on: ubuntu-latest
    env:
      VERSION:       ${{ needs.dispatch.outputs.version }}
      FREEZE_BRANCH: ${{ needs.dispatch.outputs.freeze_branch }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure git
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Tag RC on freeze branch
        run: |
          git fetch --all --tags
          git tag "${VERSION}-rc" "origin/${FREEZE_BRANCH}"
          git push origin "${VERSION}-rc"

      - name: Merge freeze into current-release and tag release
        run: |
          git fetch --all
          if git ls-remote --heads origin current-release | grep -q current-release; then
            git checkout -b current-release origin/current-release
          else
            git checkout -b current-release
          fi
          git merge --no-ff "origin/${FREEZE_BRANCH}" -m "Release ${VERSION}"
          git push origin current-release
          git tag "${VERSION}"
          git push origin "${VERSION}"

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/project-uptime:${{ needs.dispatch.outputs.version }}
            ${{ secrets.DOCKERHUB_USERNAME }}/project-uptime:latest

  # ── Release — deploy ───────────────────────────────────────────────────────
  release-deploy:
    needs: [dispatch, release-build]
    if: needs.dispatch.outputs.action == 'release'
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to production VPS
        uses: appleboy/ssh-action@v1
        with:
          host:     ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key:      ${{ secrets.VPS_SSH_KEY }}
          script: |
            cd /opt/discord-bots/project-uptime
            docker compose down
            docker compose pull
            docker compose up -d
